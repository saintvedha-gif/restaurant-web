<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Redirigiendo...</title>
    <script>
      const segmentCount = 1;
      const locationData = window.location;

      const redirectUrl =
        locationData.protocol + '//' + locationData.hostname + (locationData.port ? ':' + locationData.port : '') +
        locationData.pathname.split('/').slice(0, 1 + segmentCount).join('/') +
        '/?/' +
        locationData.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
        (locationData.search ? '&' + locationData.search.slice(1).replace(/&/g, '~and~') : '') +
        locationData.hash;

      window.location.replace(redirectUrl);
    </script>
  </head>
  <body></body>
</html>
